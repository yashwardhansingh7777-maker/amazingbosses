<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thank you · Top 100 Bosses of Bangalore</title>
<link rel="icon" href="top100%20bob%20logo%20FINAL.png" type="image/png" />
<style>
  :root { --cream:#faf5ee; --orange:#B82424; }
  html, body { margin:0; min-height:100vh; color:var(--cream);
    font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
    -webkit-font-smoothing:antialiased; }
  body { background-color:#2a0707; animation:bgCycle 24s ease-in-out infinite; }
  /* Slow cycle between dark red and black */
  @keyframes bgCycle { 0%{background-color:#070303;} 50%{background-color:#3a0c0c;} 100%{background-color:#070303;} }
  @media (prefers-reduced-motion: reduce){ body{ animation:none; background:#2a0707; } }
  .wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; gap:18px; }
  .logo { width:clamp(120px,22vw,168px); height:auto; object-fit:contain; filter:drop-shadow(0 14px 34px rgba(0,0,0,0.5)); }
  h1 { font-size:clamp(28px,5vw,42px); font-weight:700; margin:6px 0 0; letter-spacing:-0.02em; }
  p { font-size:15px; color:rgba(250,245,238,0.65); max-width:460px; line-height:1.6; margin:0; }
  .actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
  .btn { display:inline-flex; align-items:center; gap:8px; border-radius:999px; padding:11px 20px;
    font-size:14px; font-weight:600; text-decoration:none; border:1px solid #fff; color:#fff;
    background:transparent; transition:background-color .15s ease; }
  .btn:hover { background:rgba(255,255,255,0.1); }
  .btn.solid { background:var(--orange); border-color:var(--orange); }
  .btn.solid:hover { background:#d12a2a; }
  .small-link { margin-top:6px; font-size:13px; color:rgba(250,245,238,0.5);
    text-decoration:underline; text-underline-offset:3px; transition:color .15s ease; }
  .small-link:hover { color:rgba(250,245,238,0.85); }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="top100%20bob%20logo%20FINAL.png" alt="" />
    <h1>Thank you for your nomination</h1>
    <p>Thank you for voting. Your nomination has been received and will be reviewed by our editorial team. Now let's see who the best Bosses of Bangalore really are.</p>
    <div class="actions">
      <a class="btn solid" href="leaderboard.html">Check out the leaderboard</a>
      <a class="btn" href="index.html">Home</a>
    </div>
    <a class="small-link" href="nominate.html">Nominate another boss</a>
  </div>
<script src="sparks.js"></script>
</body>
</html>
