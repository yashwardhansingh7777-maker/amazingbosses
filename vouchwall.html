<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vouch Wall · Bosses of Bangalore</title>
<link rel="icon" href="top100%20bob%20logo%20FINAL.png" type="image/png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: {
        ink: '#15110d', cream: '#faf5ee',
        orange: { DEFAULT: '#e84f1b', 400: '#f36a3a' },
        gold: { DEFAULT: '#e9c46a', hi: '#fff0c9', lo: '#b8862f' },
        paper: { DEFAULT: '#f4ecdc', ink: '#23190f' }, muted: '#6b6052',
      },
      fontFamily: {
        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
        serif: ['Lora', 'ui-serif', 'Georgia', 'serif'],
        mono: ['"JetBrains Mono"', 'ui-monospace', 'Menlo', 'monospace'],
      },
      maxWidth: { page: '1280px' },
      keyframes: { 'dot-pulse': { '0%,100%': { opacity: '.4' }, '50%': { opacity: '1' } } },
      animation: { 'dot-pulse': 'dot-pulse 1.6s ease-in-out infinite' },
    } },
  };
</script>

<style>
  /* Color-cycle background - same as the rest of the site */
  html, body { overflow-x: hidden; }
  body {
    background-color: #2a0707; animation: bgCycle 24s ease-in-out infinite;
    color: #faf5ee; min-height: 100vh; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  @keyframes bgCycle {
    0% { background-color: #070303; } 50% { background-color: #3a0c0c; } 100% { background-color: #070303; } }
  @media (prefers-reduced-motion: reduce) { body { animation: none; background: #2a0707; } }
  ::selection { background: rgba(232,79,27,.35); color: #faf5ee; }
  .avatar-gradient-a { background: linear-gradient(135deg,#ffb87a,#e84f1b 60%,#6b1b00); }
  .reveal { opacity: 0; transform: translateY(16px);
    transition: opacity .7s cubic-bezier(.2,.8,.2,1), transform .7s cubic-bezier(.2,.8,.2,1); }
  .reveal.in { opacity: 1; transform: none; }

  /* Share popup */
  .share-modal { position: fixed; inset: 0; z-index: 10000; display: none; align-items: center; justify-content: center; }
  .share-modal.open { display: flex; }
  .share-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
  .share-card { position: relative; width: min(92vw, 420px); background: #1a0e0e;
    border: 1px solid rgba(250,245,238,0.18); border-radius: 18px; padding: 20px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6); color: #faf5ee; font-family: Inter, Arial, sans-serif; }
  .share-head { display: flex; align-items: center; justify-content: space-between; }
  .share-title { font-size: 16px; font-weight: 600; }
  .share-x { background: none; border: 0; color: rgba(250,245,238,0.6); font-size: 15px; cursor: pointer; line-height: 1; }
  .share-x:hover { color: #faf5ee; }
  .share-sub { font-size: 13px; color: rgba(250,245,238,0.6); margin-top: 4px; }
  .share-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
  .share-opt { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 14px 6px;
    border-radius: 14px; border: 1px solid rgba(250,245,238,0.14); background: transparent; color: #faf5ee;
    cursor: pointer; text-decoration: none; transition: background-color .15s ease, border-color .15s ease; }
  .share-opt:hover { background: rgba(250,245,238,0.06); border-color: rgba(250,245,238,0.45); }
  .share-opt .ic { font-size: 22px; line-height: 1; }
  .share-opt .nm { font-size: 11px; letter-spacing: 0.02em; color: rgba(250,245,238,0.75); }
  .share-copy { display: flex; gap: 8px; margin-top: 16px; }
  .share-copy input { flex: 1; min-width: 0; background: rgba(250,245,238,0.05);
    border: 1px solid rgba(250,245,238,0.14); border-radius: 10px; padding: 10px 12px; color: rgba(250,245,238,0.8); font-size: 12px; }
  .share-copy button { flex: 0 0 auto; padding: 10px 16px; border-radius: 10px; border: 1px solid #fff;
    background: transparent; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: background-color .15s ease; }
  .share-copy button:hover { background: rgba(255,255,255,0.1); }
</style>
</head>

<body class="text-cream font-sans">

<!-- Share popup -->
<div class="share-modal" id="shareModal" aria-hidden="true">
  <div class="share-backdrop" data-close></div>
  <div class="share-card" role="dialog" aria-modal="true">
    <div class="share-head"><div class="share-title">Share</div><button class="share-x" data-close aria-label="Close">✕</button></div>
    <div class="share-sub" id="shareSub"></div>
    <div class="share-grid" id="shareGrid"></div>
    <div class="share-copy"><input type="text" id="shareLink" readonly /><button id="shareCopy" type="button">Copy</button></div>
  </div>
</div>

<div class="relative min-h-screen">
  <!-- Header -->
  <header class="mx-auto w-full max-w-page px-5 sm:px-8 pt-5 pb-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 sm:gap-5">
      <a class="flex items-center gap-3 group shrink-0" href="index.html">
        <img src="top100%20bob%20logo%20FINAL.png" alt="" style="width:38px;height:38px" class="rounded-[10px] object-contain shrink-0" />
        <div class="leading-none shrink-0">
          <div class="text-[15px] sm:text-[17px] font-semibold text-cream group-hover:text-orange transition-colors whitespace-nowrap" style="font-family:'Circular Std','Helvetica Neue',Helvetica,Arial,sans-serif">Bosses of Bangalore</div>
        </div>
      </a>
      <nav class="flex items-center gap-1">
        <a class="px-3 py-1.5 rounded-full text-[14px] transition-colors font-medium text-white/70 hover:text-white" href="leaderboard.html">Leaderboard</a>
        <a class="px-3 py-1.5 rounded-full text-[14px] transition-colors font-medium text-white/70 hover:text-white" href="awards.html">Categories</a>
        <a class="px-3 py-1.5 rounded-full text-[14px] transition-colors font-semibold text-white ring-1 ring-white" href="vouchwall.html">Vouch Wall</a>
      </nav>
    </div>
    <a href="nominate.html" class="inline-flex items-center gap-2 bg-transparent ring-1 ring-white hover:bg-white/10 text-white rounded-full px-4 py-2 font-mono text-xs uppercase tracking-[0.16em] transition-colors">
      <span class="size-1.5 rounded-full bg-white animate-dot-pulse"></span>Nominate
    </a>
  </header>

  <main class="relative z-[1] mx-auto w-full max-w-page px-5 sm:px-8 pb-32">
    <main class="mx-auto w-full max-w-[1280px] px-4 sm:px-6 pb-28">
      <!-- Heading -->
      <div class="pt-8 pb-6 text-center">
        <h1 class="font-semibold text-[clamp(30px,5.4vw,52px)] leading-[1.04] tracking-[-0.02em]" style="font-family:'Circular Std','Helvetica Neue',Helvetica,Arial,sans-serif">Vouch Wall</h1>
        <p class="text-[14px] text-white/60 mt-2">Every boss named by the people they led.</p>
      </div>

      <!-- Vouch cards (same as the home feed) -->
      <div class="columns-1 sm:columns-2 lg:columns-3 2xl:columns-4 gap-4" id="feed"></div>
    </main>
  </main>

  <!-- Footer -->
  <footer class="mx-auto w-full max-w-page px-5 sm:px-8 py-10 text-xs font-mono uppercase tracking-[0.16em] text-white/55 flex flex-wrap items-center justify-between gap-3 border-t border-white/10">
    <span>Tal · Made in Bengaluru</span>
    <span>
      <a href="aboutus.html" class="hover:text-white">About</a>
      <span class="mx-2">·</span>
      <a href="https://tal.af" target="_blank" rel="noreferrer" class="hover:text-white">tal.af</a>
    </span>
  </footer>
</div>

<script src="people.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

  const heartSvg = `<svg viewBox="0 0 24 24" class="size-[18px]" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.4 2 5 5.2 5c2 0 3.3 1.1 4.1 2.3L12 10l2.7-2.7C15.5 6.1 16.8 5 18.8 5 22 5 23.6 8.4 22 11.7 19.5 16.4 12 21 12 21z"></path></svg>`;
  const replySvg = `<svg viewBox="0 0 24 24" class="size-[18px]" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>`;
  const shareSvg = `<svg viewBox="0 0 24 24" class="size-[18px]" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>`;

  const CAT_LABEL = { 'eng': 'Engineering', 'founders-cxos': 'Founder / CTO', 'product': 'Product' };
  const NOM_QUOTES = [
    'One of the sharpest minds I have had the chance to work under.',
    'Made the team better without ever making it about themselves.',
    'The kind of leader people quietly build their careers around.',
    'Set the bar for what good management actually looks like.',
    'Calm in chaos, clear in the noise, exactly who you want in charge.',
    'Backed bold calls and owned the outcomes, good or bad.',
    'Turned a hard year into the best learning of my career.',
    'Pragmatic, fair, and relentless about doing right by the team.',
    'Gave honest feedback that actually made me better.',
    'Protected the team from the noise so we could do our best work.',
    'One of the best in the city at what they do, no exaggeration.',
    'Shipped fast, thought clearly, and lifted everyone around them.',
    'Hired on potential and then made sure you lived up to it.',
    'A genuinely rare combination of sharp, kind, and demanding.',
    'Still the first person I call when I am stuck on something big.',
    'Built a team people fight to get onto. That says it all.',
  ];

  function buildPosts() {
    if (typeof PEOPLE === 'undefined') return [];
    const people = Object.entries(PEOPLE).map(([slug, p]) => ({ slug, ...p }));
    people.sort((a, b) => (b.votes || 0) - (a.votes || 0));
    let seed = 990991;
    const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
    const ages = ['1d', '2d', '3d', '4d', '5d', '6d', '1w', '2w'];
    let lastAuthor = '';
    return people.map((boss) => {
      let author;
      do { author = people[Math.floor(rnd() * people.length)]; }
      while (people.length > 2 && (author.slug === boss.slug || author.slug === lastAuthor));
      lastAuthor = author.slug;
      return {
        author: author.name, authorImg: author.pfp, age: ages[Math.floor(rnd() * ages.length)],
        quote: NOM_QUOTES[Math.floor(rnd() * NOM_QUOTES.length)],
        bossName: boss.name, bossImg: boss.pfp, bossRole: boss.sub,
        bossCategory: CAT_LABEL[boss.cat] || 'Top 100', namedCount: boss.votes || 1,
        likes: Math.floor(rnd() * 12), slug: boss.slug,
      };
    });
  }

  function card(p) {
    const named = `${p.namedCount} ${p.namedCount === 1 ? 'person has' : 'people have'} named them`;
    return `
    <article class="reveal mb-4 break-inside-avoid bg-transparent rounded-2xl ring-1 ring-white/30 px-5 sm:px-6 pt-5 pb-3" data-slug="${esc(p.slug)}" data-boss="${esc(p.bossName)}">
      <div class="flex items-center gap-3">
        <div class="relative shrink-0"><img src="${esc(p.authorImg)}" alt="" class="size-12 rounded-full object-cover ring-1 ring-white/25" /></div>
        <div class="min-w-0 flex-1">
          <div class="font-serif text-[17px] text-white leading-tight truncate">${esc(p.author)}</div>
          <div class="text-[12.5px] text-white/60 truncate">Named a boss · ${esc(p.age)}</div>
        </div>
      </div>
      <p class="font-serif text-[18px] sm:text-[19px] leading-[1.5] text-white/90 mt-3.5">${esc(p.quote)}</p>
      <a class="group relative block mt-4 rounded-xl bg-transparent ring-1 ring-white/30 hover:ring-white hover:bg-white/5 transition-colors overflow-hidden" href="profile.html?id=${encodeURIComponent(p.slug)}">
        <div class="flex items-center gap-3.5 p-3.5">
          <img src="${esc(p.bossImg)}" alt="" class="size-16 rounded-xl object-cover shadow-sm shrink-0" />
          <div class="min-w-0 flex-1">
            <div class="font-serif text-[20px] font-medium text-white leading-tight truncate">${esc(p.bossName)}</div>
            <div class="font-mono text-[10.5px] uppercase tracking-[0.1em] text-white/60 mt-1 truncate">${esc(p.bossRole)}</div>
            <span class="inline-flex items-center gap-1.5 mt-2 font-mono text-[9.5px] uppercase tracking-[0.12em] text-gold bg-transparent ring-1 ring-white/40 rounded-full px-2.5 py-1">${esc(p.bossCategory)}</span>
          </div>
        </div>
        <div class="flex items-center justify-between px-3.5 py-2.5 border-t border-white/15 font-mono text-[10.5px] uppercase tracking-[0.1em] text-white/60">
          <span>${named}</span>
          <span class="text-gold font-medium group-hover:translate-x-0.5 transition-transform">See their wall →</span>
        </div>
      </a>
      <div class="flex items-center gap-1 mt-2 pt-1">
        <button type="button" class="like-btn inline-flex items-center gap-2 rounded-full px-3 py-1.5 text-[13px] font-medium text-white/60 ring-1 ring-white/30 hover:text-white hover:ring-white transition-colors" aria-pressed="false">${heartSvg}<span class="tabular-nums">${p.likes}</span></button>
        <button type="button" class="reply-btn inline-flex items-center gap-2 rounded-full px-3 py-1.5 text-[13px] font-medium text-white/60 ring-1 ring-white/30 hover:bg-white/10 hover:text-white hover:ring-white transition-colors">${replySvg}Reply</button>
        <div class="ml-auto"><button type="button" title="Share" class="share-btn inline-flex items-center gap-2 rounded-full px-3 py-1.5 text-[13px] font-medium text-white/60 ring-1 ring-white/30 hover:bg-white/10 hover:text-white hover:ring-white transition-colors">${shareSvg}Share</button></div>
      </div>
      <div class="reply-box hidden mt-3">
        <textarea class="reply-input w-full bg-transparent ring-1 ring-white/25 rounded-xl px-3 py-2 text-[14px] text-white placeholder-white/40 resize-none focus:outline-none focus:ring-white/60" rows="2" placeholder="Add your reply…" maxlength="280"></textarea>
        <div class="flex items-center justify-end gap-2 mt-2">
          <button type="button" class="reply-cancel rounded-full px-3 py-1.5 text-[12px] text-white/55 hover:text-white transition-colors">Cancel</button>
          <button type="button" class="reply-post rounded-full px-4 py-1.5 text-[12px] font-medium bg-transparent ring-1 ring-white text-white hover:bg-white/10 transition-colors">Post</button>
        </div>
      </div>
      <div class="replies"></div>
    </article>`;
  }

  const POSTS = buildPosts();
  $('feed').innerHTML = POSTS.map(card).join('');

  // card actions (same as home)
  $('feed').addEventListener('click', (e) => {
    const likeBtn = e.target.closest('.like-btn');
    if (likeBtn) {
      const n = likeBtn.querySelector('span'); const liked = likeBtn.getAttribute('aria-pressed') === 'true';
      likeBtn.setAttribute('aria-pressed', String(!liked)); likeBtn.classList.toggle('text-orange', !liked); likeBtn.classList.toggle('ring-orange', !liked);
      n.textContent = String((parseInt(n.textContent, 10) || 0) + (liked ? -1 : 1)); return;
    }
    const replyBtn = e.target.closest('.reply-btn');
    if (replyBtn) { const box = replyBtn.closest('article').querySelector('.reply-box'); const willOpen = box.classList.contains('hidden'); box.classList.toggle('hidden'); if (willOpen) setTimeout(() => box.querySelector('.reply-input').focus(), 30); return; }
    const cancelBtn = e.target.closest('.reply-cancel');
    if (cancelBtn) { const box = cancelBtn.closest('.reply-box'); box.classList.add('hidden'); box.querySelector('.reply-input').value = ''; return; }
    const postBtn = e.target.closest('.reply-post');
    if (postBtn) {
      const card = postBtn.closest('article'); const box = card.querySelector('.reply-box'); const ta = box.querySelector('.reply-input'); const text = ta.value.trim();
      if (!text) { ta.focus(); return; }
      const item = document.createElement('div'); item.className = 'mt-2 rounded-xl bg-white/5 ring-1 ring-white/15 px-3.5 py-2.5';
      const meta = document.createElement('div'); meta.className = 'text-[11.5px] text-white/50 mb-0.5'; meta.textContent = 'You · just now';
      const body = document.createElement('div'); body.className = 'text-[14px] text-white/90 leading-snug'; body.textContent = text;
      item.append(meta, body); card.querySelector('.replies').appendChild(item); ta.value = ''; box.classList.add('hidden'); return;
    }
    const shareBtn = e.target.closest('.share-btn');
    if (shareBtn) { const card = shareBtn.closest('article'); openShare(card.dataset.slug, card.dataset.boss); }
  });

  function openShare(slug, boss) {
    const modal = document.getElementById('shareModal');
    const url = location.origin + location.pathname.replace(/[^/]*$/, '') + 'profile.html?id=' + encodeURIComponent(slug || '');
    const text = 'Check out ' + (boss || 'this boss') + ' on the Top 100 Bosses of Bangalore';
    const U = encodeURIComponent(url), T = encodeURIComponent(text);
    document.getElementById('shareSub').textContent = boss ? ('Vouch for ' + boss) : '';
    const targets = [
      { name: 'WhatsApp', icon: '💬', href: 'https://wa.me/?text=' + T + '%20' + U },
      { name: 'X', icon: '𝕏', href: 'https://twitter.com/intent/tweet?text=' + T + '&url=' + U },
      { name: 'LinkedIn', icon: '💼', href: 'https://www.linkedin.com/sharing/share-offsite/?url=' + U },
      { name: 'Telegram', icon: '✈️', href: 'https://t.me/share/url?url=' + U + '&text=' + T },
      { name: 'Email', icon: '✉️', href: 'mailto:?subject=' + T + '&body=' + U },
      { name: 'Facebook', icon: '📘', href: 'https://www.facebook.com/sharer/sharer.php?u=' + U },
    ];
    document.getElementById('shareGrid').innerHTML = targets.map(t => `<a class="share-opt" href="${t.href}" target="_blank" rel="noreferrer"><span class="ic">${t.icon}</span><span class="nm">${t.name}</span></a>`).join('');
    document.getElementById('shareLink').value = url; modal.classList.add('open'); modal.setAttribute('aria-hidden', 'false');
  }
  (function () {
    const modal = document.getElementById('shareModal');
    modal.addEventListener('click', (e) => { if (e.target.hasAttribute('data-close')) { modal.classList.remove('open'); modal.setAttribute('aria-hidden', 'true'); } });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { modal.classList.remove('open'); modal.setAttribute('aria-hidden', 'true'); } });
    const copyBtn = document.getElementById('shareCopy');
    copyBtn.addEventListener('click', async () => {
      const link = document.getElementById('shareLink').value;
      try { await navigator.clipboard.writeText(link); } catch (e) { const i = document.getElementById('shareLink'); i.select(); document.execCommand('copy'); }
      copyBtn.textContent = 'Copied'; setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1400);
    });
  })();

  const io = new IntersectionObserver((entries) => { entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } }); }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach((el) => io.observe(el));
</script>
<script src="sparks.js"></script>
</body>
</html>
