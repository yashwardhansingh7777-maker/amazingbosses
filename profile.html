<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profile · Top 100 Bosses of Bangalore</title>

<style>
  *, *::before, *::after{
    font-style: normal !important;
    font-synthesis: none !important;
    font-variation-settings: "ital" 0, "slnt" 0 !important;
    font-family: Arial, "Helvetica Neue", Helvetica, sans-serif !important;
  }

  :root{
    --ink:#13100b;
    --cream:#faf5ee;
    --muted:#a89c8a;
    --orange:#941B1B;
    --orange-400:#B82424;
    --line: rgba(250,245,238,0.05);
    --line-2: rgba(250,245,238,0.10);
    --max-page: 920px;
    --font-helv: Arial, "Helvetica Neue", Helvetica, sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;overflow-x:hidden}
  body{
    background-color:#2a0707;
    animation:bgCycle 24s ease-in-out infinite;
    color:var(--cream);
    font-family:var(--font-helv);
    font-weight:300;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
  }
  /* Slow cycle between dark red and black */
  @keyframes bgCycle{
    0%{background-color:#070303;}
    50%{background-color:#3a0c0c;}
    100%{background-color:#070303;}
  }
  @media (prefers-reduced-motion: reduce){
    body{ animation:none; background:#2a0707; }
  }
  h1,h2,h3,h4,h5,h6{font-weight:700;letter-spacing:-0.02em;margin:0}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}

  .page{max-width:var(--max-page);margin:0 auto;padding:0 20px;position:relative;z-index:1}
  @media(min-width:640px){ .page{padding:0 32px} }

  /* ============ HEADER ============ */
  header.site{
    display:flex;align-items:center;justify-content:space-between;
    padding-top:20px;padding-bottom:12px;
  }
  .back{
    display:inline-flex;align-items:center;gap:8px;
    font-size:11px;letter-spacing:0.22em;text-transform:uppercase;
    color:rgba(250,245,238,0.65);font-weight:500;
    padding:8px 12px;border-radius:999px;
    border:1px solid rgba(250,245,238,0.10);
    background:rgba(250,245,238,0.04);
    transition:background-color .15s ease, color .15s ease;
  }
  .back:hover{ color:var(--cream); background:rgba(250,245,238,0.08); }
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    border-radius:999px;padding:8px 16px;
    font-size:12px;letter-spacing:0.16em;text-transform:uppercase;
    border:0;cursor:pointer;font-weight:500;
    transition:background-color .15s ease;
  }
  .btn-orange{background:var(--orange);color:var(--cream)}
  .btn-orange:hover{background:var(--orange-400)}
  .dot{
    width:6px;height:6px;border-radius:999px;background:var(--cream);
    animation:pulse 1.6s ease-in-out infinite;
  }
  .dot.led-green{
    width:8px;height:8px;background:#22ff66;
    box-shadow:0 0 6px 1px rgba(34,255,102,0.85), 0 0 14px 3px rgba(34,255,102,0.45);
    animation:ledBlink 1.1s steps(1,end) infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes ledBlink{
    0%, 60%   { opacity:1;   box-shadow:0 0 6px 1px rgba(34,255,102,0.9), 0 0 16px 4px rgba(34,255,102,0.55); }
    61%, 100% { opacity:0.25; box-shadow:0 0 3px 1px rgba(34,255,102,0.35); }
  }

  /* ============ HERO ============ */
  main.site{padding-top:32px;padding-bottom:64px}
  .person-hero{
    display:grid;grid-template-columns:1fr;gap:24px;
    align-items:center;
  }
  @media(min-width:640px){
    .person-hero{ grid-template-columns: auto 1fr; gap:28px; }
  }
  .avatar-stack{
    display:flex;align-items:center;gap:18px;
  }
  .avatar-big{
    width:140px;height:140px;border-radius:24px;overflow:hidden;
    background:#1c1612;
    border:1px solid var(--line-2);
    box-shadow:
      0 30px 70px rgba(0,0,0,0.60),
      0 12px 24px rgba(0,0,0,0.50),
      0 0 0 1px rgba(250,245,238,0.08) inset;
    background-size:cover;background-position:center;
    flex-shrink:0;
  }
  @media(min-width:640px){ .avatar-big{ width:160px; height:160px; } }

  /* Rank number sits right beside the avatar - single inline-block so # and digit stay glued */
  .rank-badge{
    display:inline-block;
    font-weight:900;line-height:0.9;letter-spacing:-0.04em;
    font-size:clamp(64px, 12vw, 96px);
    color:#ffb47a;
    background:linear-gradient(180deg, #ffe7c9 0%, #ffb47a 45%, #B82424 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 4px 24px rgba(184,36,36,0.35);
    white-space:nowrap;
  }
  .rank-badge .rank-hash{
    font-size:0.6em;
    margin-right:-0.04em;
  }

  /* Category tag below the big number - shows only the category name */
  .rank-cat{
    display:inline-block;
    margin-top:6px;
    padding:5px 10px;border-radius:999px;
    background:rgba(184,36,36,0.18);
    border:1px solid rgba(184,36,36,0.35);
    font-size:9.5px;letter-spacing:0.22em;text-transform:uppercase;
    font-weight:600;color:var(--cream);
    white-space:nowrap;
  }
  /* Stack avatar | (rank above, cat-rank below) */
  .rank-col{
    display:flex;flex-direction:column;align-items:center;gap:0;
  }

  .person-meta .eyebrow{
    font-size:10px;letter-spacing:0.26em;text-transform:uppercase;
    color:rgba(250,245,238,0.55);font-weight:500;margin-bottom:6px;
  }
  .person-meta h1{
    font-size:clamp(28px, 5vw, 44px);line-height:1.05;
    color:var(--cream);letter-spacing:-0.02em;
  }
  .person-meta .sub{
    margin-top:8px;
    font-size:12px;letter-spacing:0.18em;text-transform:uppercase;
    color:rgba(250,245,238,0.7);font-weight:500;
  }
  .person-meta .why{
    margin-top:14px;
    font-size:15px;line-height:1.5;
    color:rgba(250,245,238,0.85);
    max-width:580px;
  }
  .stat-row{
    display:flex;flex-wrap:wrap;gap:14px;margin-top:18px;align-items:center;
  }
  .stat-pill{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 14px;border-radius:999px;
    background:rgba(148,27,27,0.18);
    border:1px solid rgba(184,36,36,0.35);
    font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    font-weight:500;color:var(--cream);
  }
  .stat-pill .num{
    font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;
    letter-spacing:0.04em;
  }
  .stat-pill.top100{
    background:var(--orange);border-color:var(--orange-400);
  }

  /* ============ VOUCHES ============ */
  .vouches-section{
    margin-top:48px;
    position:relative;
  }
  .section-eyebrow{
    font-size:10px;letter-spacing:0.26em;text-transform:uppercase;
    color:rgba(250,245,238,0.55);font-weight:500;margin-bottom:14px;
  }
  .vouch-list{
    display:flex;flex-direction:column;gap:12px;
  }
  .vouch{
    padding:18px 20px;
    border:1px solid var(--line-2);
    background:rgba(250,245,238,0.03);
    border-radius:14px;
    transition: background-color .2s ease, transform .2s ease;
  }
  .vouch:hover{ background:rgba(250,245,238,0.05); transform:translateY(-2px); }
  .vouch .quote{
    font-size:15px;line-height:1.55;color:var(--cream);
    font-weight:300;
  }
  .vouch .attr{
    margin-top:10px;
    display:flex;align-items:center;gap:8px;
    font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
    color:rgba(250,245,238,0.55);font-weight:500;
  }
  /* Homepage-style vouch cards (author + quote + actions) */
  .vouch-list .vcard{
    border:1px solid rgba(250,245,238,0.20);
    border-radius:18px;
    padding:18px 20px 10px;
    background:transparent;
    transition:border-color .2s ease, background-color .2s ease, transform .2s ease;
  }
  .vouch-list .vcard:hover{
    border-color:rgba(250,245,238,0.4); background:rgba(250,245,238,0.03);
    transform:translateY(-2px);
  }
  .vcard .vc-head{ display:flex;align-items:center;gap:12px;text-decoration:none; }
  .vcard .vc-av{
    width:46px;height:46px;border-radius:999px;object-fit:cover;flex:0 0 auto;
    border:1px solid rgba(250,245,238,0.2);
  }
  .vcard .vc-id{ display:flex;flex-direction:column;gap:2px;min-width:0; }
  .vcard .vc-name{ font-size:16px;color:var(--cream);font-weight:600;line-height:1.2; }
  .vcard .vc-head:hover .vc-name{ color:#ffd8a0; }
  .vcard .vc-sub{
    font-size:11.5px;color:rgba(250,245,238,0.55);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .vcard .vc-quote{
    font-size:16.5px;line-height:1.5;color:rgba(250,245,238,0.92);font-weight:300;margin-top:14px;
  }
  .vcard .vc-foot{ display:flex;align-items:center;gap:6px;margin-top:12px;padding-top:6px; }
  .vcard .vc-act{
    display:inline-flex;align-items:center;gap:7px;
    padding:7px 12px;border-radius:999px;
    font-size:12.5px;color:rgba(250,245,238,0.55);
    background:transparent;border:0;cursor:pointer;
    transition:background-color .15s ease, color .15s ease;
  }
  .vcard .vc-act:hover{ background:rgba(250,245,238,0.06);color:var(--cream); }
  .vcard .vc-act.like:hover{ color:var(--orange); }
  .vcard .vc-act.liked{ color:var(--orange); }
  .vcard .vc-act svg{ width:17px;height:17px; }
  .vcard .vc-act.share{ margin-left:auto; }
  .vouch .verify{
    display:inline-flex;align-items:center;gap:6px;
    color:#22ff66;
  }
  .vouch .verify::before{
    content:"";width:6px;height:6px;border-radius:999px;background:#22ff66;
    box-shadow:0 0 4px 1px rgba(34,255,102,0.6);
  }

  /* Submit-a-vouch CTA + inline form */
  .vouch-cta-row{
    display:flex;justify-content:flex-end;margin: -4px 0 14px;
  }
  .vouch-cta{
    display:inline-flex;align-items:center;gap:8px;
    padding:9px 16px;border-radius:999px;
    font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    font-weight:600;color:var(--cream);
    background:var(--orange);border:0;cursor:pointer;
    box-shadow:0 6px 16px rgba(148,27,27,0.35);
    transition:background-color .15s ease, transform .15s ease;
  }
  .vouch-cta:hover{ background:var(--orange-400); transform:translateY(-1px); }
  .vouch-cta::before{
    content:"";width:6px;height:6px;border-radius:999px;background:var(--cream);
    box-shadow:0 0 6px rgba(250,245,238,0.6);
  }

  .vouch-form{
    margin-bottom:14px;
    padding:18px 20px;
    border-radius:14px;
    border:1px solid rgba(184,36,36,0.35);
    background:rgba(148,27,27,0.08);
    display:none;
  }
  .vouch-form.open{ display:block; }
  .vouch-form .form-eyebrow{
    font-size:10px;letter-spacing:0.26em;text-transform:uppercase;
    color:rgba(250,245,238,0.65);font-weight:500;margin-bottom:10px;
  }
  .vouch-form textarea,
  .vouch-form input{
    width:100%;display:block;
    font-family:var(--font-helv);font-size:14px;color:var(--cream);
    background:rgba(19,16,11,0.55);
    border:1px solid rgba(250,245,238,0.10);
    border-radius:10px;
    padding:12px 14px;
    resize:vertical;
    outline:none;
    transition:border-color .15s ease, background-color .15s ease;
  }
  .vouch-form textarea{ min-height:96px; font-weight:300; line-height:1.5; }
  .vouch-form input{ margin-top:10px; font-size:13px; }
  .vouch-form textarea:focus,
  .vouch-form input:focus{
    border-color:rgba(184,36,36,0.55);
    background:rgba(19,16,11,0.75);
  }
  .vouch-form textarea::placeholder,
  .vouch-form input::placeholder{ color:rgba(250,245,238,0.35); }
  .vouch-form .form-row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin-top:12px;
  }
  .vouch-form .count{
    font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
    color:rgba(250,245,238,0.5);font-weight:500;
    font-variant-numeric:tabular-nums;
  }
  .vouch-form .count.over{ color:#ff7a7a; }
  .vouch-form .form-actions{ display:flex;gap:8px; }
  .vouch-form button{
    padding:9px 14px;border-radius:999px;
    font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    font-weight:600;cursor:pointer;border:0;
    transition:background-color .15s ease, color .15s ease;
  }
  .vouch-form .cancel{
    background:rgba(250,245,238,0.06);color:rgba(250,245,238,0.7);
  }
  .vouch-form .cancel:hover{ background:rgba(250,245,238,0.12); color:var(--cream); }
  .vouch-form .submit{
    background:var(--orange);color:var(--cream);
  }
  .vouch-form .submit:hover{ background:var(--orange-400); }
  .vouch-form .submit:disabled{
    background:rgba(148,27,27,0.4);color:rgba(250,245,238,0.5);cursor:not-allowed;
  }

  /* User-submitted vouch row tag */
  .vouch.mine{
    border-color:rgba(34,255,102,0.30);
    background:rgba(34,255,102,0.06);
    animation: voucnIn 480ms cubic-bezier(0.2,0.9,0.2,1);
  }
  @keyframes voucnIn{
    0%   { transform:translateY(-6px); opacity:0; }
    100% { transform:translateY(0);    opacity:1; }
  }
  .vouch .mine-tag{
    display:inline-flex;align-items:center;gap:6px;
    color:#22ff66;
  }
  .vouch .mine-tag::before{
    content:"";width:6px;height:6px;border-radius:999px;background:#22ff66;
    box-shadow:0 0 4px 1px rgba(34,255,102,0.65);
  }

  /* Tail blur + "+ N more vouches" */
  .vouch-tail{
    position:relative;
    margin-top: -90px;            /* eat into the last vouch so the blur visibly fades it */
    padding-top: 130px;
    padding-bottom: 24px;
    text-align:center;
    pointer-events:none;
  }
  .vouch-tail-fade{
    position:absolute;left:0;right:0;top:0;bottom:-160px;
    pointer-events:none;
  }
  .vouch-tail-fade::before,
  .vouch-tail-fade::after,
  .vouch-tail-fade > .blur-strong{
    content:"";position:absolute;left:0;right:0;top:0;bottom:0;
    pointer-events:none;
  }
  .vouch-tail-fade::before{
    backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
    -webkit-mask-image:linear-gradient(to bottom, transparent 0%, #000 28%, #000 100%);
            mask-image:linear-gradient(to bottom, transparent 0%, #000 28%, #000 100%);
  }
  .vouch-tail-fade::after{
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    -webkit-mask-image:linear-gradient(to bottom, transparent 0%, transparent 40%, #000 72%, #000 100%);
            mask-image:linear-gradient(to bottom, transparent 0%, transparent 40%, #000 72%, #000 100%);
  }
  .vouch-tail-fade > .blur-strong{
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    -webkit-mask-image:linear-gradient(to bottom, transparent 0%, transparent 60%, #000 92%, #000 100%);
            mask-image:linear-gradient(to bottom, transparent 0%, transparent 60%, #000 92%, #000 100%);
  }
  .vouch-tail-text{
    position:relative;
    font-size:13px;letter-spacing:0.22em;text-transform:uppercase;
    color:rgba(250,245,238,0.65);font-weight:500;
    text-shadow:0 1px 12px rgba(19,16,11,0.6);
  }
  .vouch-tail-text .more{
    color:var(--cream);font-weight:700;font-variant-numeric:tabular-nums;
    letter-spacing:0.04em;
  }

  /* Background atmosphere - subtle red waves */
  .waves{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .waves .wave{
    position:absolute;left:-25%;right:-25%;
    height:60vh;border-radius:50%;
    filter:blur(110px);
    opacity:0.18;
    will-change:transform;
    mix-blend-mode:screen;
  }
  .waves .w1{
    top:-10vh;
    background:radial-gradient(ellipse at center, #941B1B 0%, rgba(148,27,27,0.5) 40%, transparent 70%);
  }
  .waves .w2{
    top:30vh;opacity:0.14;
    background:radial-gradient(ellipse at center, #6E1414 0%, rgba(110,20,20,0.4) 45%, transparent 75%);
  }

  footer.site{
    max-width:var(--max-page);margin:0 auto;padding:32px 20px;
    border-top:1px solid var(--line);
    font-size:12px;letter-spacing:0.16em;text-transform:uppercase;
    color:rgba(168,156,138,0.8);font-weight:300;
    display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px;
    position:relative;z-index:1;
  }
  @media(min-width:640px){ footer.site{padding:32px 32px} }

  /* Not-found state */
  .not-found{
    text-align:center;padding:80px 20px;
  }
  .not-found h1{ font-size:28px; }
  .not-found p{
    margin-top:12px;color:rgba(250,245,238,0.6);
    font-size:14px;
  }

  /* Floating top-left logo (matches homepage) */
  .logo-mark{
    position:fixed;top:14px;left:14px;z-index:50;
    display:inline-flex;align-items:center;
    padding:5px;border-radius:12px;
    background:rgba(10,8,5,0.45);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(250,245,238,0.10);
    transition:transform .15s ease, background-color .15s ease, border-color .15s ease;
  }
  .logo-mark:hover{
    transform:translateY(-1px);
    background:rgba(10,8,5,0.6);
    border-color:rgba(250,245,238,0.18);
  }
  .logo-mark img{ height:32px;width:auto;display:block; }
  @media (min-width: 768px){
    .logo-mark{ top:18px; left:18px; }
    .logo-mark img{ height:38px; }
  }
  /* On profile, the existing "← Leaderboard" pill sits in the header; nudge it right
     a touch on small screens so the floating logo has room. */
  @media (max-width: 480px){
    header.site .back{ margin-left:48px; }
  }

</style>
</head>
<body>
<a class="logo-mark" href="index.html" aria-label="Top 100 home">
  <img src="top100%20bob%20logo%20FINAL.png" alt="Top 100" />
</a>


<div class="waves" aria-hidden="true">
  <div class="wave w1"></div>
  <div class="wave w2"></div>
</div>

<div class="page">
  <header class="site">
    <a class="back" href="board.html">← Leaderboard</a>
    <a class="btn btn-orange" href="nominate.html">
      <span class="dot led-green"></span>Nominate
    </a>
  </header>

  <main class="site" id="main">
    <!-- Filled by JS -->
  </main>
</div>

<footer class="site">
  <span>Top 100 Bosses of Bangalore</span>
  <a href="index.html">Home</a>
</footer>

<script src="people.js"></script>
<script>
  // Pool of vouch lines. A profile's vouches are generated FROM other real nominees,
  // each paired with one of these lines - deterministically per slug so it reads
  // consistently across reloads.
  const VOUCH_TEXTS = [
    "Best boss I've worked under. Made me a better engineer in the process.",
    "Honest, demanding, kind, in roughly that order. The combination is rare.",
    "Cared about my career more than the next quarter. That's why I stayed.",
    "Set the bar for what management is supposed to feel like.",
    "Took a chance on me when I had nothing to show. I owe them a lot.",
    "Gave me cover to take risks and the credit when they paid off.",
    "First boss who made feedback feel like a gift instead of a chore.",
    "Would join their next company tomorrow without reading the deck.",
    "Quietly the reason half the team is still around.",
    "Made me ambitious about my own work again. That's not nothing.",
    "Calm in chaos. Never once saw them pass stress downward.",
    "Shipped fast, broke little, and explained every call along the way.",
    "Protected the team from noise so we could actually build.",
    "Hired me on potential and then made sure I lived up to it.",
    "The clearest thinker I've worked with. Cuts straight to what matters.",
    "Turned a messy quarter into the best learning of my career.",
    "Gives hard feedback in a way that makes you grateful, not defensive.",
    "Remembers the small things about everyone. People notice that.",
    "Backed my idea in the room when it would've been easier not to.",
    "Genuinely one of the good ones. Rare in this industry.",
    "Pushed me harder than anyone and I'm better for every bit of it.",
    "Knows the difference between urgent and important, and acts on it.",
    "Made hard decisions look easy and easy people feel valued.",
    "Still the person I call when I'm stuck on something big.",
    "Built a team people fight to get onto. That tells you everything.",
    "Led from the front on the worst days, not just the good ones.",
    "Trusted me before I trusted myself. Changed my trajectory.",
    "No ego, all signal. Exactly who you want in the room.",
  ];

  // Small seeded PRNG so each profile's generated vouches are stable per reload.
  function seeded(str){
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++){
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function(){
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      return ((h ^= h >>> 16) >>> 0) / 4294967296;
    };
  }

  // Generate `count` vouches for `slug`, each FROM a random OTHER nominee.
  function generateVouches(slug, count){
    if (typeof PEOPLE === 'undefined') return [];
    const others = Object.entries(PEOPLE)
      .filter(([s]) => s !== slug)
      .map(([s, p]) => ({ slug: s, name: p.name, role: p.sub, pfp: p.pfp }));
    if (!others.length) return [];
    const rnd = seeded(slug + '::vouch');
    const out = [];
    let lastVoucher = -1, lastText = -1;
    for (let i = 0; i < count; i++){
      let vi; do { vi = Math.floor(rnd() * others.length); } while (others.length > 1 && vi === lastVoucher);
      let ti; do { ti = Math.floor(rnd() * VOUCH_TEXTS.length); } while (ti === lastText);
      lastVoucher = vi; lastText = ti;
      const v = others[vi];
      const days = 1 + Math.floor(rnd() * 27);
      out.push({
        quote: VOUCH_TEXTS[ti], who: v.name, role: v.role, pfp: v.pfp, slug: v.slug,
        ago: days + 'd', likes: Math.floor(rnd() * 36),
      });
    }
    return out;
  }

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  const MAX_QUOTE = 220;
  const VOUCH_KEY = (slug) => 'vouches_' + slug;

  function loadMyVouches(slug){
    try { return JSON.parse(localStorage.getItem(VOUCH_KEY(slug)) || '[]'); }
    catch (e) { return []; }
  }
  function saveMyVouches(slug, list){
    try { localStorage.setItem(VOUCH_KEY(slug), JSON.stringify(list)); }
    catch (e) {}
  }

  function computeRank(slug){
    if (typeof PEOPLE === 'undefined') return null;
    const all = Object.entries(PEOPLE)
      .map(([s, p]) => ({ slug: s, votes: p.votes }))
      .sort((a, b) => b.votes - a.votes);
    const i = all.findIndex(e => e.slug === slug);
    return i >= 0 ? i + 1 : null;
  }
  function computeCategoryRank(slug, cat){
    if (typeof PEOPLE === 'undefined' || !cat) return null;
    const inCat = Object.entries(PEOPLE)
      .filter(([s, p]) => p.cat === cat)
      .map(([s, p]) => ({ slug: s, votes: p.votes }))
      .sort((a, b) => b.votes - a.votes);
    const i = inCat.findIndex(e => e.slug === slug);
    return i >= 0 ? { rank: i + 1, size: inCat.length } : null;
  }
  const CATEGORY_LABEL = {
    'founders-cxos':  'Founders / CXOs',
    'eng':            'Engineering',
    'product':        'Product',
  };

  function relTime(ts){
    const diff = Math.max(0, Date.now() - ts);
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'Just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    const d = Math.floor(h / 24);
    return d + 'd ago';
  }

  let currentSlug = '';
  let currentPerson = null;

  function render(){
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || '';
    const p = (typeof PEOPLE !== 'undefined') ? PEOPLE[id] : null;
    const main = document.getElementById('main');
    if (!p) {
      main.innerHTML = '<div class="not-found"><h1>Profile not found.</h1><p>That nominee isn\'t on the list. Head back to the leaderboard.</p></div>';
      document.title = 'Profile not found · Top 100 Bosses of Bangalore';
      return;
    }
    document.title = p.name + ' · Top 100 Bosses of Bangalore';
    currentSlug = id;
    currentPerson = p;

    const myVouches = loadMyVouches(id);
    const totalVouches = p.votes + myVouches.length;
    const genCount = Math.max(0, Math.min(20, totalVouches - myVouches.length));
    const placeholderVouches = generateVouches(id, genCount);
    const visibleCount = myVouches.length + placeholderVouches.length;
    const remaining = Math.max(0, totalVouches - visibleCount);
    const rank = computeRank(id);
    const catRank = computeCategoryRank(id, p.cat);
    const catLabel = CATEGORY_LABEL[p.cat] || p.cat;

    const myHtml = myVouches.map(v => `
      <div class="vouch mine">
        <div class="quote">${esc(v.quote)}</div>
        <div class="attr">${esc(v.who || 'Anonymous')} <span class="mine-tag">Your vouch · ${esc(relTime(v.ts))}</span></div>
      </div>
    `).join('');

    const heartSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.4 2 5 5.2 5c2 0 3.3 1.1 4.1 2.3L12 10l2.7-2.7C15.5 6.1 16.8 5 18.8 5 22 5 23.6 8.4 22 11.7 19.5 16.4 12 21 12 21z"></path></svg>';
    const replySvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>';
    const shareSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>';
    const firstName = esc(p.name.split(' ')[0]);

    const placeholderHtml = placeholderVouches.map(v => `
      <article class="vcard">
        <a class="vc-head" href="profile.html?id=${encodeURIComponent(v.slug)}">
          <img class="vc-av" src="${esc(v.pfp)}" alt="" loading="lazy" />
          <span class="vc-id">
            <span class="vc-name">${esc(v.who)}</span>
            <span class="vc-sub">Vouched for ${firstName} · ${esc(v.ago)}</span>
          </span>
        </a>
        <div class="vc-quote">${esc(v.quote)}</div>
        <div class="vc-foot">
          <button type="button" class="vc-act like">${heartSvg}<span>${v.likes}</span></button>
          <button type="button" class="vc-act">${replySvg}Reply</button>
          <button type="button" class="vc-act share">${shareSvg}Share</button>
        </div>
      </article>
    `).join('');

    main.innerHTML = `
      <section class="person-hero">
        <div class="avatar-stack">
          <div class="avatar-big" style="background-image:url('${esc(p.pfp)}')"></div>
          ${rank ? `
            <div class="rank-col">
              <div class="rank-badge"><span class="rank-hash">#</span><span class="rank-num">${rank}</span></div>
              ${catRank ? `<div class="rank-cat">${esc(catLabel)}</div>` : ''}
            </div>
          ` : ''}
        </div>
        <div class="person-meta">
          <div class="eyebrow">Top 100 Nominee</div>
          <h1>${esc(p.name)}</h1>
          <div class="sub">${esc(p.sub)}</div>
          <p class="why">${esc(p.why)}</p>
          <div class="stat-row">
            <span class="stat-pill top100">Top 100</span>
            <span class="stat-pill"><span class="num" id="totalNum">${totalVouches.toLocaleString()}</span> Vouches</span>
          </div>
        </div>
      </section>

      <section class="vouches-section">
        <div class="section-eyebrow">Recent Vouches</div>

        <div class="vouch-cta-row">
          <button type="button" class="vouch-cta" id="vouchOpen">Vouch for ${esc(p.name.split(' ')[0])}</button>
        </div>

        <form class="vouch-form" id="vouchForm" autocomplete="off">
          <div class="form-eyebrow">Why are they a top boss?</div>
          <textarea id="vouchQuote" placeholder="e.g. Best boss I've worked under. Made me a better engineer." maxlength="${MAX_QUOTE}"></textarea>
          <input type="text" id="vouchWho" placeholder="Your name or role (optional)" maxlength="60" />
          <div class="form-row">
            <span class="count" id="vouchCount">0 / ${MAX_QUOTE}</span>
            <div class="form-actions">
              <button type="button" class="cancel" id="vouchCancel">Cancel</button>
              <button type="submit" class="submit" id="vouchSubmit" disabled>Submit Vouch</button>
            </div>
          </div>
        </form>

        <div class="vouch-list" id="vouchList">
          ${myHtml}${placeholderHtml}
        </div>

        <div class="vouch-tail">
          <div class="vouch-tail-fade"><div class="blur-strong"></div></div>
          <div class="vouch-tail-text">+ <span class="more" id="moreCount">${remaining.toLocaleString()}</span> more vouches</div>
        </div>
      </section>
    `;

    wireForm();
    wireLikes();
  }

  function wireLikes(){
    const list = document.getElementById('vouchList');
    if (!list) return;
    list.addEventListener('click', (e) => {
      const btn = e.target.closest('.vc-act.like');
      if (!btn) return;
      const n = btn.querySelector('span');
      const liked = btn.classList.toggle('liked');
      n.textContent = String((parseInt(n.textContent, 10) || 0) + (liked ? 1 : -1));
    });
  }

  function wireForm(){
    const openBtn  = document.getElementById('vouchOpen');
    const form     = document.getElementById('vouchForm');
    const quoteEl  = document.getElementById('vouchQuote');
    const whoEl    = document.getElementById('vouchWho');
    const countEl  = document.getElementById('vouchCount');
    const submitEl = document.getElementById('vouchSubmit');
    const cancelEl = document.getElementById('vouchCancel');
    if (!openBtn || !form) return;

    function updateCount(){
      const n = quoteEl.value.trim().length;
      countEl.textContent = n + ' / ' + MAX_QUOTE;
      countEl.classList.toggle('over', n > MAX_QUOTE);
      submitEl.disabled = (n < 8 || n > MAX_QUOTE);
    }

    openBtn.addEventListener('click', () => {
      form.classList.add('open');
      openBtn.style.display = 'none';
      setTimeout(() => quoteEl.focus(), 50);
    });
    cancelEl.addEventListener('click', () => {
      form.classList.remove('open');
      openBtn.style.display = '';
      quoteEl.value = ''; whoEl.value = ''; updateCount();
    });
    quoteEl.addEventListener('input', updateCount);

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const quote = quoteEl.value.trim();
      if (quote.length < 8 || quote.length > MAX_QUOTE) return;
      const who = whoEl.value.trim().slice(0, 60);
      const list = loadMyVouches(currentSlug);
      list.unshift({ quote, who, ts: Date.now() });
      saveMyVouches(currentSlug, list);
      form.classList.remove('open');
      openBtn.style.display = '';
      quoteEl.value = ''; whoEl.value = ''; updateCount();
      render();
      // Tick the total-vouches stat with a brief flash
      const total = document.getElementById('totalNum');
      if (total) {
        total.style.transition = 'color 200ms ease, text-shadow 200ms ease';
        total.style.color = '#ffd8a0';
        total.style.textShadow = '0 0 12px rgba(255,180,100,0.7)';
        setTimeout(() => { total.style.color = ''; total.style.textShadow = ''; }, 500);
      }
    });
  }

  render();
</script>
<script src="sparks.js"></script>
</body>
</html>
